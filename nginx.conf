
server {

    listen 80;

    client_max_body_size 100M;


    location /admin/ {
        proxy_pass http://django_app:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличиваем таймауты (на случай долгих тяжелых запросов в админке)
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
    }

    # 3. Проксирование API в Django
    location /api/ {
        proxy_pass http://django_app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Раздача статики Django
    location /static/ {
        alias /usr/www/static/;
    }

    location /media/ {
        # Можно продублировать или увеличить лимит точечно здесь для медиа-файлов
        client_max_body_size 100M;
        alias /usr/www/media/;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
