server {
    listen 443 ssl;
    listen [::]:443 ssl;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/nurstart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nurstart.com/privkey.pem;

    # Оптимизация SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /admin/ {
        proxy_pass http://django_app:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Увеличиваем таймауты (на случай долгих тяжелых запросов в админке)
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
    }

    # 3. Проксирование API в Django
    location /api/ {
        proxy_pass http://django_app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Раздача статики Django
    location /static/ {
        alias /usr/www/static/;
    }

    location /media/ {
        # Можно продублировать или увеличить лимит точечно здесь для медиа-файлов
        client_max_body_size 100M;
        alias /usr/www/media/;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
