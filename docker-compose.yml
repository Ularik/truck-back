services:
  db:
    image: postgres:17-alpine
    container_name: truck_db
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  django_app:
    image: ularchik/truck_back:latest
    container_name: django_app
    restart: always
    expose:
      - "8000" # Убираем ports, используем expose для связи внутри сети
    # Используем Gunicorn, как в вашем первоначальном файле
    command: >
      sh -c "python manage.py migrate --noinput && 
             python manage.py collectstatic --noinput && 
             gunicorn --bind 0.0.0.0:8000 --workers 4 project.wsgi:application"
    volumes:
      # Пробрасываем только папки статики и медиа как именованные тома,
      # чтобы Nginx мог их читать
      - static_volume:/usr/www/static
      - media_volume:/usr/www/media
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    image: ularchik/truck_front
    container_name: nginx_front
    restart: always
    expose:
      - "3000"
    volumes:
      # Важно! Чтобы Nginx в образе видел статику Django,
      # волюмы все равно нужно пробросить
      - static_volume:/usr/www/static
    env_file:
      - .env.frontend
    depends_on:
      - django_app

  nginx:
    image: nginx:alpine
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/www/static
      - media_volume:/usr/www/media
    depends_on:
      - django_app
      - frontend
volumes:
  postgres_data:
  static_volume:
  media_volume: